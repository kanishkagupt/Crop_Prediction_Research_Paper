<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Crop Prediction AI Model</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f4f4f4;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
    }

    h1 {
      text-align: center;
      color: #333;
    }

    form {
      background-color: #fff;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
    }

    label {
      font-weight: bold;
    }

    input[type="text"] {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border: 1px solid #ccc;
      border-radius: 4px;
      box-sizing: border-box;
    }

    input[type="submit"],
    .button-link {
      background-color: #4CAF50;
      color: white;
      padding: 14px 20px;
      margin: 8px 0;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      width: 100%;
      text-align: center;
      display: inline-block;
      text-decoration: none;
    }

    input[type="submit"]:hover,
    .button-link:hover {
      background-color: #45a049;
    }

    .result {
      margin-top: 20px;
      padding: 10px;
      background-color: #f0f0f0;
      border-radius: 8px;
      box-shadow: 0px 0px 5px rgba(0, 0, 0, 0.1);
    }

    .result h2 {
      color: #333;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Crop Prediction AI Model</h1>
    <form id="prediction-form">
      <label for="nitrogen">Nitrogen (N):</label>
      <input type="text" id="nitrogen" name="nitrogen" required>

      <label for="phosphorous">Phosphorous (P):</label>
      <input type="text" id="phosphorous" name="phosphorous" required>

      <label for="potassium">Potassium (K):</label>
      <input type="text" id="potassium" name="potassium" required>

      <label for="temperature">Temperature (°C):</label>
      <input type="text" id="temperature" name="temperature" required>

      <label for="humidity">Humidity (%):</label>
      <input type="text" id="humidity" name="humidity" required>

      <label for="ph">Ph:</label>
      <input type="text" id="ph" name="ph" required>

      <label for="rainfall">Rainfall (mm):</label>
      <input type="text" id="rainfall" name="rainfall" required>

      <input type="submit" value="Predict">
    </form>

    <div class="result" id="prediction-result" style="display: none;">
      <h2>Prediction Result</h2>
      <p id="predicted-crop"></p>
      <a href="/fertilizer-recommendation" class="button-link">Go to Fertilizer Recommendation</a>
      
    </div>
  </div>

  <script>
    document.getElementById('prediction-form').addEventListener('submit', function(event) {
      event.preventDefault();

      const nitrogen = parseFloat(document.getElementById('nitrogen').value);
      const phosphorous = parseFloat(document.getElementById('phosphorous').value);
      const potassium = parseFloat(document.getElementById('potassium').value);
      const temperature = parseFloat(document.getElementById('temperature').value);
      const humidity = parseFloat(document.getElementById('humidity').value);
      const ph = parseFloat(document.getElementById('ph').value);
      const rainfall = parseFloat(document.getElementById('rainfall').value);

      fetch('/results', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({
          nitrogen: nitrogen,
          phosphorous: phosphorous,
          potassium: potassium,
          temperature: temperature,
          humidity: humidity,
          ph: ph,
          rainfall: rainfall
        }),
      })
      .then(response => response.json())
      .then(data => {
        document.getElementById('predicted-crop').textContent = `Predicted Crop: ${data.prediction}`;
        document.getElementById('prediction-result').style.display = 'block';
      })
      .catch((error) => {
        console.error('Error:', error);
      });
    });
  </script>
</body>
</html>
