<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fertilizer Recommendation</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f2f2f2;
            padding: 30px;
        }
        .container {
            background: white;
            padding: 25px;
            border-radius: 10px;
            max-width: 600px;
            margin: auto;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        h2 {
            text-align: center;
            margin-bottom: 20px;
        }
        label, input {
            display: block;
            width: 100%;
            margin: 10px 0;
        }
        button {
            padding: 10px;
            background: #4CAF50;
            border: none;
            color: white;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            background-color: #dff0d8;
            border-left: 5px solid #3c763d;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Fertilizer Recommendation</h2>
        <form method="POST" action="/fertilizer-recommendation">
            <label for="nitrogen">Nitrogen (N):</label>
            <input type="number" id="nitrogen" name="nitrogen" required>

            <label for="phosphorus">Phosphorus (P):</label>
            <input type="number" id="phosphorus" name="phosphorus" required>

            <label for="potassium">Potassium (K):</label>
            <input type="number" id="potassium" name="potassium" required>

            <button type="submit">Get Recommendation</button>
        </form>

        {% if recommendation %}
        <div class="result">
            <h3>Recommended Fertilizers:</h3>
            <p>{{ recommendation }}</p>
        </div>
        {% endif %}
    </div>
</body>
</html>
